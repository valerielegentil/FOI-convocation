<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOI Convocation</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #162B45;
            line-height: 1.6;
        }
        .header {
            background: #162B45;
            color: #D4AF37;
            padding: 20px 0;
            text-align: center;
        }
        .accordion {
            background-color: #ffffff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin: 20px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .accordion:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .content {
            padding: 10px 0;
            border-top: 1px solid #D4AF37;
            margin-top: 10px;
            display: none;
        }
        .course-info {
            background-color: #7BDCB5;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>FOI Convocation 2026</h1>
        <p>Your gateway to academic success</p>
    </header>
    <div class="accordion" onclick="this.nextElementSibling.style.display='block'; this.style.display='none';">
        <h2>Course Information</h2>
    </div>
    <div class="content">
        <div class="course-info">
            <h3>Course 1: Introduction to FOI</h3>
            <p>Details about Course 1.</p>
        </div>
        <div class="course-info">
            <h3>Course 2: Advanced FOI Studies</h3>
            <p>Details about Course 2.</p>
        </div>
    </div>
    <script>
        document.querySelectorAll('.accordion').forEach(item => {
            item.addEventListener('click', function() {
                const content = this.nextElementSibling;
                content.style.display = content.style.display === 'block' ? 'none' : 'block';
            });
        });
    </script>
</body>
</html>
